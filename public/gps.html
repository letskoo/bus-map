<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>기사 GPS 전송</title>

<style>
body{font-family:sans-serif;text-align:center;padding:40px;background:#111;color:#fff;}
button{font-size:20px;padding:20px 40px;margin-top:20px;border-radius:12px;border:none;background:#00c853;color:white;}
#status{margin-top:30px;font-size:18px;color:#00e676;white-space:pre-line;}
</style>
</head>
<body>

<h1>🚍 기사 GPS 전송</h1>
<button onclick="startGps()">운행 시작</button>
<button onclick="stopGps()" style="background:#d50000;">정지</button>

<div id="status">대기중</div>

<script>
const SERVER = "https://bus-server-production.up.railway.app";
const ROUTE_ID = 2;

let timer=null;

function log(t){
 document.getElementById("status").innerText=t;
 console.log(t);
}

function sendGps(){
 navigator.geolocation.getCurrentPosition(async(pos)=>{
   const lat=pos.coords.latitude;
   const lng=pos.coords.longitude;

   log("좌표\n"+lat+"\n"+lng+"\n전송중");

   try{
     await fetch(SERVER+"/driver/location",{
       method:"POST",
       headers:{
         "Content-Type":"application/json"
       },
       body:JSON.stringify({
         routeId:ROUTE_ID,
         lat:lat,
         lng:lng
       })
     });

     log("전송완료\n"+lat+"\n"+lng);

   }catch(e){
     log("전송실패 "+e);
   }

 },(err)=>{
   log("GPS 오류 "+err.message);
 },{
   enableHighAccuracy:true,
   timeout:10000
 });
}

function startGps(){
 log("GPS 시작");
 sendGps();
 timer = setInterval(sendGps,5000);
}

function stopGps(){
 if(timer){
   clearInterval(timer);
   log("정지");
 }
}
</script>

</body>
</html>
