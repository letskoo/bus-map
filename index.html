<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>버스 위치</title>

<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=7760a4557ccbf1f9dd40e051124ba1fc"></script>

<style>
body{margin:0;background:#000;color:#fff;text-align:center;font-family:sans-serif;}
#map{width:100%;height:100vh;}
#top{
position:fixed;
top:0;
left:0;
right:0;
background:#000;
padding:8px;
font-size:14px;
z-index:9;
}
</style>
</head>
<body>

<div id="top">버스 위치 추적중...</div>
<div id="map"></div>

<script>
const SERVER="https://bus-server-production.up.railway.app";

// 🔥 URL 토큰 읽기
const token=new URLSearchParams(location.search).get("token");

if(!token){
 alert("토큰 없음");
 throw "no token";
}

let map;
let marker;

// 🔥 최초 로딩
async function init(){
 try{
   const res=await fetch(SERVER+"/share/"+token);
   const data=await res.json();

   console.log("초기데이터",data);

   if(!data.location){
     alert("위치 없음 (운행 시작 안됨)");
     return;
   }

   const lat=data.location.latitude;
   const lng=data.location.longitude;

   map=new kakao.maps.Map(document.getElementById("map"),{
     center:new kakao.maps.LatLng(lat,lng),
     level:3
   });

   marker=new kakao.maps.Marker({
     position:new kakao.maps.LatLng(lat,lng),
     map:map
   });

   start();

 }catch(e){
   console.log(e);
   alert("서버 연결 실패");
 }
}

// 🔥 2초마다 갱신
function start(){
 setInterval(async()=>{
   try{
     const res=await fetch(SERVER+"/share/"+token+"?t="+Date.now());
     const data=await res.json();

     console.log("갱신",data);

     if(!data.location) return;

     const lat=data.location.latitude;
     const lng=data.location.longitude;

     const pos=new kakao.maps.LatLng(lat,lng);

     marker.setPosition(pos);
     map.setCenter(pos);

   }catch(e){
     console.log("갱신실패",e);
   }

 },2000);
}

init();
</script>

</body>
</html>
